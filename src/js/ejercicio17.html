<!DOCTYPE html>
<html>
<body>

<script>
const contarLetraA = (texto) => {
    let contador = 0;

    for (let i = 0; i < texto.length; i++) {
        if (texto[i].toLowerCase() === 'a') {
            contador++;
        }
    }

    return contador;
};

let texto = prompt("Ingrese un texto:");
let resultado = contarLetraA(texto);

document.write(`<p>La letra 'a' aparece <strong>${resultado}</strong> veces en el texto ingresado.</p>`);
</script>

</body>
</html>
