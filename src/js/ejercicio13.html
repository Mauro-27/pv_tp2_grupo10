<!DOCTYPE html>
<html>
<head>
    <title>Ejercicio 13</title>
</head>
<body>

<script>
const mostrarArreglo = (arr) => {
    arr.forEach(num => {
        document.write(`${num} <br>`);
    });
};

// pedir datos
let cantidad = parseInt(prompt("¿Cuántos números vas a ingresar?"));
let numeros = [];

for (let i = 0; i < cantidad; i++) {
    let num = parseInt(prompt(`Ingrese número ${i + 1}:`));
    numeros.push(num);
}

mostrarArreglo(numeros);
</script>

</body>
</html>
